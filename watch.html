<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Movie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 id="movieTitle">🎬 Watch Movie</h1>
</header>

<div class="watch-container">
    <video id="moviePlayer" controls autoplay>
        <source id="movieSource" src="" type="video/mp4">
    </video>
    <div id="externalLink" class="watch-link"></div>
</div>

<div class="back-btn">
    <a href="index.html">⬅ Back to Home</a>
</div>

<script>
const movie = JSON.parse(localStorage.getItem("selectedMovie"));
const watchLink = document.getElementById("externalLink");

if(movie){
    document.getElementById("movieTitle").textContent = movie.title;

    if (movie.link && movie.link.endsWith('.mp4')) {
        const player = document.getElementById("moviePlayer");
        player.src = movie.link;
        player.load();
    } else if (movie.link) {
        document.getElementById("moviePlayer").style.display = "none";
        watchLink.innerHTML = `<p>This movie link is external. <a href="${movie.link}" target="_blank" rel="noopener">Open movie link</a></p>`;
    }
}
</script>

</body>
</html>
